# Self-contained dev stack: everything needed to run the app with log
# aggregation in one file — db, redis, the containerized app, and the
# Loki + Promtail + Grafana logging stack. Deploy with a single command:
#
#   docker compose -f docker-compose.dev.yml up -d --build   (or `make observe`)
#
# docker-compose.local.yml stays separate and lightweight (db + redis only) for
# plain host development with `make up` + `make run`.
services:
  db:
    image: postgres:17
    container_name: fastapi_base_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_base
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: fastapi_base_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_base_app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src:app --host 0.0.0.0 --port 8000"
    environment:
      # Talk to the sibling containers by service name (override .env localhost).
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fastapi_base
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  loki:
    image: grafana/loki:3.3.2
    container_name: fastapi_base_loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  promtail:
    image: grafana/promtail:3.3.2
    container_name: fastapi_base_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Docker service discovery + reading container logs.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    container_name: fastapi_base_grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # Open straight onto the provisioned "App Logs" dashboard.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/app-logs.json
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  lokidata:
  grafanadata:
